$schema: https://git.drupalcode.org/project/drupal/-/raw/HEAD/core/assets/schemas/v1/metadata.schema.json
name: 'Nav Data links'
status: stable
description: 'List of download links for flight computer files (OpenAir, CUP).'
props:
  type: object
  properties:
    hasDescription:
      type: boolean
      title: Has description
    links:
      type: array
      title: Links
      items:
        type: object
        properties:
          url:
            type: string
            title: URL
          title:
            type: string
            title: Title
slots:
  description:
    title: Description
    description: 'Optional editable text shown above the links.'
    examples:
      - '<p>Download these to your flight computer before you fly.</p>'
